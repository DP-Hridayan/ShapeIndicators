name: Release Demo APK

on:
  push:
    tags:
      - '*'   # triggers on any tag like v1.0, v2.1.0, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE_64 }}" | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Build signed release APK
        run: ./gradlew :demo:assembleRelease --no-daemon
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with tag version
        run: |
          VERSION="${{ github.ref_name }}"
          mv demo/build/outputs/apk/release/demo-release.apk \
             demo/build/outputs/apk/release/ShapeIndicators-demo-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: demo/build/outputs/apk/release/ShapeIndicators-demo-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
